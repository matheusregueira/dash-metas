<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard de Metas — Stone Barbacena</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --green: #00A868;
      --green-dark: #007A4C;
      --green-light: #E6F7F0;
      --red: #E74C3C;
      --red-light: #FDF0EF;
      --yellow: #F5A623;
      --yellow-light: #FFFBEB;
      --gray-bg: #F4F5F7;
      --gray-line: #EBEBEB;
      --gray-text: #6B7280;
      --text: #111827;
      --white: #fff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--gray-bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--green);
      padding: 16px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    header h1 { color: white; font-size: 1.2rem; font-weight: 700; }
    header p  { color: rgba(255,255,255,0.85); font-size: 0.82rem; margin-top: 2px; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #data-hoje {
      color: rgba(255,255,255,0.9);
      font-size: 0.85rem;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-white { background: white; color: var(--green-dark); }
    .btn-outline { background: transparent; border: 1.5px solid rgba(255,255,255,0.6); color: white; }

    .container {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .agentes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 20px;
    }

    .agente-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      border-left: 4px solid var(--gray-line);
    }

    .agente-card.status-ok     { border-left-color: var(--green); }
    .agente-card.status-alerta { border-left-color: var(--yellow); }
    .agente-card.status-risco  { border-left-color: var(--red); }

    .agente-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .agente-nome { font-weight: 700; font-size: 1.05rem; }
    .agente-trilha { font-size: 0.78rem; color: var(--gray-text); margin-top: 2px; }

    .agente-score { text-align: right; }

    .score-num {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--green);
      line-height: 1;
    }

    .score-num.alerta { color: var(--yellow); }
    .score-num.risco  { color: var(--red); }

    .score-label { font-size: 0.72rem; color: var(--gray-text); margin-top: 2px; }

    .kpi-list { display: flex; flex-direction: column; gap: 10px; }

    .kpi-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 5px;
    }

    .kpi-nome { font-size: 0.82rem; font-weight: 600; }

    .kpi-nums {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;
      font-size: 0.78rem;
      color: var(--gray-text);
      justify-content: flex-end;
    }

    .kpi-nums span { white-space: nowrap; }
    .kpi-nums .destaque { font-weight: 700; color: var(--text); }

    .kpi-bar-wrap {
      height: 8px;
      background: var(--gray-line);
      border-radius: 99px;
      overflow: hidden;
    }

    .kpi-bar-real {
      height: 100%;
      border-radius: 99px;
      background: var(--green);
      transition: width 0.4s ease;
    }

    .kpi-bar-real.warn { background: var(--yellow); }
    .kpi-bar-real.bad  { background: var(--red); }

    .agente-footer {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--gray-line);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .valor-projetado { font-size: 0.82rem; color: var(--gray-text); }
    .valor-projetado strong { color: var(--text); font-size: 0.95rem; }

    .btn-lancar {
      padding: 6px 14px;
      background: var(--green-light);
      color: var(--green-dark);
      border: 1.5px solid var(--green);
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn-lancar:hover { background: var(--green); color: white; }

    .admin-only { display: none !important; }
    body.admin-mode .admin-only { display: inline-flex !important; }
    body.admin-mode .admin-only[style*="flex-direction:column"] { display: flex !important; }
    .admin-hide { display: inline !important; }
    body.admin-mode .admin-hide { display: none !important; }
    body.admin-mode .admin-block { display: flex !important; }
    .admin-block { display: none !important; }

    .btn-lock {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.5);
      color: white;
      border-radius: 8px;
      padding: 7px 12px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.15s;
    }
    .btn-lock:hover { background: rgba(255,255,255,0.15); }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 14px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      margin: 16px;
    }

    .modal h2 { font-size: 1.05rem; font-weight: 700; margin-bottom: 20px; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--gray-text); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
    .form-group input, .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--gray-line);
      border-radius: 8px;
      font-size: 0.92rem;
      font-family: inherit;
      outline: none;
      transition: border 0.15s;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--green); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
    }

    .btn-cancel { background: var(--gray-bg); color: var(--gray-text); }
    .btn-save   { background: var(--green); color: white; }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray-text);
    }
    .empty h3 { font-size: 1.1rem; margin-bottom: 8px; color: var(--text); }

    .status-badge {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 99px;
    }
    .badge-ok     { background: var(--green-light); color: var(--green-dark); }
    .badge-alerta { background: var(--yellow-light); color: #92600A; }
    .badge-risco  { background: var(--red-light); color: #991B1B; }

    .tabs-bar {
      background: var(--green-dark);
      padding: 0 28px;
      display: flex;
      gap: 4px;
    }
    .tab-btn {
      padding: 10px 20px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.65);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-family: inherit;
      transition: all 0.15s;
    }
    .tab-btn.active { color: white; border-bottom-color: white; }
    .tab-btn:hover  { color: white; }

    .btn-nav {
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.4);
      color: white;
      border-radius: 6px;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .btn-nav:hover { background: rgba(255,255,255,0.28); }

    @media (max-width: 640px) {
      header { padding: 12px 16px; }
      header h1 { font-size: 1rem; }
      header p  { font-size: 0.75rem; }
      header img { height: 30px; }
      .header-right { gap: 8px; }
      #mes-label { min-width: 90px; font-size: 0.85rem; }
      .btn { padding: 6px 10px; font-size: 0.78rem; }
      .container { margin: 14px auto; gap: 14px; }
      .tabs-bar { padding: 0 12px; }
      .tab-btn { padding: 8px 14px; font-size: 0.82rem; }
      .agentes-grid { grid-template-columns: 1fr; }
      .agente-card { padding: 14px; }
      .agente-nome { font-size: 0.95rem; }
      .score-num { font-size: 1.4rem; }
      .kpi-nums { gap: 4px 8px; font-size: 0.72rem; }
      .form-row { grid-template-columns: 1fr; }
      .modal { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:12px">
    <img src="logo.png" alt="Logo" style="height:40px;object-fit:contain;">
    <div>
      <h1>Dashboard de Metas</h1>
      <p>Stone Barbacena/MG</p>
    </div>
  </div>
  <div class="header-right">
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
      <span style="color:rgba(255,255,255,0.7);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.4px;">Última atualização</span>
      <span id="data-display" class="admin-hide" style="color:white;font-size:0.85rem;font-weight:600;">—</span>
      <input type="date" id="data-hoje" class="admin-only" onchange="salvarData(this.value)"
        style="background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.4);border-radius:7px;padding:4px 8px;color:white;font-size:0.85rem;font-family:inherit;outline:none;cursor:pointer;color-scheme:dark;">
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <button id="btn-mes-prev" class="btn-nav" onclick="mesAnterior()">&#8249;</button>
      <span id="mes-label" style="color:white;font-weight:700;font-size:0.95rem;min-width:130px;text-align:center;">—</span>
      <button id="btn-mes-next" class="btn-nav" onclick="mesSeguinte()">&#8250;</button>
    </div>
    <button class="btn btn-outline admin-only" onclick="novoMes()">Novo Mês</button>
    <button class="btn btn-outline admin-only" onclick="abrirModalAgente(null)">+ Agente</button>
    <button class="btn btn-white admin-only" onclick="abrirModalLancar(null)">Lançar Realizado</button>
    <button class="btn-lock" id="btn-lock" onclick="toggleAdmin()" title="Área administrativa">🔒</button>
  </div>
</header>

<div class="tabs-bar">
  <button class="tab-btn active" id="tab-btn-comercial" onclick="trocarAba('comercial')">Comercial</button>
  <button class="tab-btn" id="tab-btn-logistica" onclick="trocarAba('logistica')">Logística</button>
</div>

<div class="container">
  <div id="tab-comercial">
    <div class="agentes-grid" id="agentes-grid">
      <div class="empty" id="empty-state">
        <h3>Nenhum agente cadastrado</h3>
        <p>Clique em "+ Agente" para começar</p>
      </div>
    </div>
  </div>
  <div id="tab-logistica" style="display:none">
    <div id="log-card-wrap"></div>
  </div>
</div>

<!-- Modal: Cadastro de Agente -->
<div class="overlay" id="modal-agente">
  <div class="modal">
    <h2 id="modal-agente-titulo">Cadastrar Agente</h2>
    <input type="hidden" id="agente-edit-id">

    <div class="form-group">
      <label>Nome do Agente</label>
      <input type="text" id="ag-nome" placeholder="Ex: João Silva">
    </div>

    <div class="form-group">
      <label>Trilha</label>
      <select id="ag-trilha">
        <option value="600">Aspira — R$ 600</option>
        <option value="1200">Agente 1 — R$ 1.200</option>
        <option value="1700">Agente 2 — R$ 1.700</option>
        <option value="2000">Agente 3 — R$ 2.000</option>
        <option value="2400">Agente 4 — R$ 2.400</option>
      </select>
    </div>

    <p style="font-size:0.8rem;font-weight:700;color:var(--gray-text);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:12px">Metas do Mês</p>

    <div class="form-row">
      <div class="form-group">
        <label>NA — Meta</label>
        <input type="number" id="ag-na-meta" placeholder="Ex: 12" min="0">
      </div>
      <div class="form-group" style="display:flex;align-items:flex-end">
        <p style="font-size:0.78rem;color:var(--gray-text);padding-bottom:11px">Peso 30%</p>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>TPV M1 — Meta (R$)</label>
        <input type="number" id="ag-tpv-meta" placeholder="Ex: 330000" min="0">
      </div>
      <div class="form-group" style="display:flex;align-items:flex-end">
        <p style="font-size:0.78rem;color:var(--gray-text);padding-bottom:11px">Peso 40% · Teto 150%</p>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Churn — Meta (%)</label>
        <input type="number" id="ag-churn-meta" placeholder="Ex: 5.6" min="0" step="0.1">
      </div>
      <div class="form-group" style="display:flex;align-items:flex-end">
        <p style="font-size:0.78rem;color:var(--gray-text);padding-bottom:11px">Peso 30%</p>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="fecharModal('modal-agente')">Cancelar</button>
      <button class="btn btn-save" onclick="salvarAgente()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal: Lançar Realizado -->
<div class="overlay" id="modal-lancar">
  <div class="modal">
    <h2>Lançar Realizado</h2>

    <div class="form-group">
      <label>Agente</label>
      <select id="lancar-agente"></select>
    </div>

    <div class="form-group">
      <label>NA Realizado</label>
      <input type="number" id="lancar-na" placeholder="0" min="0">
    </div>

    <div class="form-group">
      <label>TPV M1 Realizado (R$)</label>
      <input type="number" id="lancar-tpv" placeholder="0" min="0">
    </div>

    <div class="form-group">
      <label>Churn Realizado (%)</label>
      <input type="number" id="lancar-churn" placeholder="0" min="0" step="0.1">
    </div>

    <div class="form-group">
      <label>Clientes 50k+ (bônus)</label>
      <input type="number" id="lancar-bonus" placeholder="0" min="0">
    </div>

    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="fecharModal('modal-lancar')">Cancelar</button>
      <button class="btn btn-save" onclick="salvarLancamento()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal: Configurar Logística -->
<div class="overlay" id="modal-log-config">
  <div class="modal">
    <h2>Configurar Logística</h2>

    <div class="form-group">
      <label>Nome</label>
      <input type="text" id="log-nome" placeholder="Ex: Ana Silva">
    </div>

    <p style="font-size:0.8rem;font-weight:700;color:var(--gray-text);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:12px">Metas</p>

    <div class="form-row">
      <div class="form-group">
        <label>TMA Stone (meta &lt;)</label>
        <input type="number" id="log-tma-stone" placeholder="Ex: 0.85" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label>TMA Ton (meta &lt;)</label>
        <input type="number" id="log-tma-ton" placeholder="Ex: 2.5" step="0.01" min="0">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Ciclo Triagem (meta &lt;)</label>
        <input type="number" id="log-ciclo" placeholder="Ex: 0.9" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label>TMA Bobinas (meta &lt;)</label>
        <input type="number" id="log-tma-bobinas" placeholder="Ex: 0.9" step="0.01" min="0">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>SLA Stone (%)</label>
        <input type="number" id="log-sla-stone" placeholder="Ex: 97" step="0.1" min="0" max="100">
      </div>
      <div class="form-group">
        <label>SLA Ton (%)</label>
        <input type="number" id="log-sla-ton" placeholder="Ex: 97" step="0.1" min="0" max="100">
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="fecharModal('modal-log-config')">Cancelar</button>
      <button class="btn btn-save" onclick="salvarLogConfig()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal: Lançar Realizado Logística -->
<div class="overlay" id="modal-log-lancar">
  <div class="modal">
    <h2>Lançar Realizado — Logística</h2>

    <div class="form-row">
      <div class="form-group">
        <label>TMA Stone</label>
        <input type="number" id="log-r-tma-stone" placeholder="0" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label>TMA Ton</label>
        <input type="number" id="log-r-tma-ton" placeholder="0" step="0.01" min="0">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Ciclo Triagem</label>
        <input type="number" id="log-r-ciclo" placeholder="0" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label>TMA Bobinas</label>
        <input type="number" id="log-r-tma-bobinas" placeholder="0" step="0.01" min="0">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>SLA Stone (%)</label>
        <input type="number" id="log-r-sla-stone" placeholder="0" step="0.1" min="0" max="100">
      </div>
      <div class="form-group">
        <label>SLA Ton (%)</label>
        <input type="number" id="log-r-sla-ton" placeholder="0" step="0.1" min="0" max="100">
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="fecharModal('modal-log-lancar')">Cancelar</button>
      <button class="btn btn-save" onclick="salvarLogLancamento()">Salvar</button>
    </div>
  </div>
</div>

<script>
  // ── Supabase ────────────────────────────────────────────
  const SUPA_URL = 'https://cyseabealxbtwubvhyrh.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN5c2VhYmVhbHhidHd1YnZoeXJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzkwNzgsImV4cCI6MjA5Mzc1NTA3OH0.eHXjTtjyCf7fYusZhUJmRh9sKWe5tNGXGI06tVjbjeM';
  const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

  // ── Estado ─────────────────────────────────────────────
  let agentes = [];

  const TRILHAS = {
    600:  'Aspira',
    1200: 'Agente 1',
    1700: 'Agente 2',
    2000: 'Agente 3',
    2400: 'Agente 4'
  };

  // ── Cálculo do score ────────────────────────────────────
  function calcScore(ag) {
    const r = ag.realizado || {};

    const naAting    = ag.naMeta    > 0 ? (r.na    || 0) / ag.naMeta    * 100 : 0;
    const tpvAting   = ag.tpvMeta   > 0 ? Math.min((r.tpv || 0) / ag.tpvMeta * 100, 150) : 0;
    const churnAting = (r.churn     || 0) > 0 ? ag.churnMeta / r.churn * 100 : 0;

    const base  = naAting * 0.30 + tpvAting * 0.40 + churnAting * 0.30;
    const bonus = (r.bonus || 0) > 0 && naAting > 0
      ? (r.bonus * naAting * 0.25) * 0.30 : 0;

    return { naAting, tpvAting, churnAting, score: base + bonus };
  }

  function statusScore(score) {
    if (score >= 100) return 'ok';
    if (score >= 50)  return 'alerta';
    return 'risco';
  }

  // ── Renderização ────────────────────────────────────────
  function render() {
    const grid  = document.getElementById('agentes-grid');
    const empty = document.getElementById('empty-state');

    if (agentes.length === 0) {
      empty.style.display = '';
      grid.innerHTML = '';
      grid.appendChild(empty);
      return;
    }

    empty.style.display = 'none';
    grid.innerHTML = '';

    agentes.forEach(ag => {
      const { naAting, tpvAting, churnAting, score } = calcScore(ag);
      const st         = statusScore(score);
      const trilhaNome = TRILHAS[ag.trilha] || 'Aspira';
      const comissao   = ag.trilha * score / 100;

      const card       = document.createElement('div');
      card.className   = `agente-card status-${st}`;

      const scoreClass = st === 'ok' ? '' : st === 'alerta' ? 'alerta' : 'risco';

      card.innerHTML = `
        <div class="agente-header">
          <div>
            <div class="agente-nome">${ag.nome}</div>
            <div class="agente-trilha">${trilhaNome} · 100% = R$ ${Number(ag.trilha).toLocaleString('pt-BR')}</div>
          </div>
          <div class="agente-score">
            <div class="score-num ${scoreClass}">${score.toFixed(1)}%</div>
          </div>
        </div>

        <div class="kpi-list">
          ${kpiRow('NA',     naAting,    ag.naMeta,    ag.realizado?.na    || 0, false)}
          ${kpiRow('TPV M1', tpvAting,   ag.tpvMeta,   ag.realizado?.tpv   || 0, false)}
          ${kpiRow('Churn',  churnAting, ag.churnMeta, ag.realizado?.churn || 0, true)}
        </div>

        <div class="agente-footer">
          <div class="valor-projetado">
            Comissão: <strong>R$ ${comissao.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2})}</strong>
          </div>
          <div style="display:flex;gap:8px" class="admin-block">
            <button class="btn-lancar" onclick="abrirModalAgente('${ag.id}')">Editar</button>
            <button class="btn-lancar" onclick="abrirModalLancar('${ag.id}')">Lançar</button>
          </div>
        </div>
      `;

      grid.appendChild(card);
    });
  }

  function kpiRow(nome, ating, meta, real, inverso) {
    const barReal = Math.min(ating, 100);
    const cls = ating >= 100 ? '' : ating >= 50 ? 'warn' : 'bad';

    const metaFmt = inverso
      ? meta.toLocaleString('pt-BR', {maximumFractionDigits:1}) + '%'
      : (nome === 'TPV M1' ? 'R$ ' + Number(meta).toLocaleString('pt-BR') : meta);

    const realFmt = inverso
      ? Number(real).toLocaleString('pt-BR', {maximumFractionDigits:1}) + '%'
      : (nome === 'TPV M1' ? 'R$ ' + Number(real).toLocaleString('pt-BR') : real);

    return `
      <div class="kpi-item">
        <div class="kpi-top">
          <span class="kpi-nome">${nome}</span>
          <div class="kpi-nums">
            <span>Meta: <span class="destaque">${metaFmt}</span></span>
            <span>Real: <span class="destaque">${realFmt}</span></span>
            <span>Ating: <span class="destaque">${ating.toFixed(1)}%</span></span>
          </div>
        </div>
        <div class="kpi-bar-wrap">
          <div class="kpi-bar-real ${cls}" style="width:${barReal}%"></div>
        </div>
      </div>`;
  }

  // ── Modais ──────────────────────────────────────────────
  function abrirModalAgente(id) {
    document.getElementById('agente-edit-id').value = id || '';
    if (id) {
      const ag = agentes.find(a => a.id === id);
      document.getElementById('modal-agente-titulo').textContent = 'Editar Agente';
      document.getElementById('ag-nome').value       = ag.nome;
      document.getElementById('ag-trilha').value     = ag.trilha;
      document.getElementById('ag-na-meta').value    = ag.naMeta;
      document.getElementById('ag-tpv-meta').value   = ag.tpvMeta;
      document.getElementById('ag-churn-meta').value = ag.churnMeta;
    } else {
      document.getElementById('modal-agente-titulo').textContent = 'Cadastrar Agente';
      document.getElementById('ag-nome').value       = '';
      document.getElementById('ag-trilha').value     = '600';
      document.getElementById('ag-na-meta').value    = '';
      document.getElementById('ag-tpv-meta').value   = '';
      document.getElementById('ag-churn-meta').value = '';
    }
    document.getElementById('modal-agente').classList.add('open');
  }

  function abrirModalLancar(id) {
    const sel = document.getElementById('lancar-agente');
    sel.innerHTML = agentes.map(a => `<option value="${a.id}" ${a.id===id?'selected':''}>${a.nome}</option>`).join('');
    if (id) {
      const ag = agentes.find(a => a.id === id);
      const r  = ag.realizado || {};
      document.getElementById('lancar-na').value    = r.na    || '';
      document.getElementById('lancar-tpv').value   = r.tpv   || '';
      document.getElementById('lancar-churn').value = r.churn || '';
      document.getElementById('lancar-bonus').value = r.bonus || '';
    } else {
      document.getElementById('lancar-na').value    = '';
      document.getElementById('lancar-tpv').value   = '';
      document.getElementById('lancar-churn').value = '';
      document.getElementById('lancar-bonus').value = '';
    }
    sel.addEventListener('change', () => {
      const ag = agentes.find(a => a.id === sel.value);
      const r  = ag?.realizado || {};
      document.getElementById('lancar-na').value    = r.na    || '';
      document.getElementById('lancar-tpv').value   = r.tpv   || '';
      document.getElementById('lancar-churn').value = r.churn || '';
      document.getElementById('lancar-bonus').value = r.bonus || '';
    });
    document.getElementById('modal-lancar').classList.add('open');
  }

  function fecharModal(id) {
    document.getElementById(id).classList.remove('open');
  }

  // ── Salvar ──────────────────────────────────────────────
  async function salvarAgente() {
    const nome      = document.getElementById('ag-nome').value.trim();
    const trilha    = Number(document.getElementById('ag-trilha').value);
    const naMeta    = Number(document.getElementById('ag-na-meta').value);
    const tpvMeta   = Number(document.getElementById('ag-tpv-meta').value);
    const churnMeta = Number(document.getElementById('ag-churn-meta').value);

    if (!nome || !naMeta || !tpvMeta || !churnMeta) {
      alert('Preencha todos os campos.'); return;
    }

    const editId = document.getElementById('agente-edit-id').value;
    if (editId) {
      const ag = agentes.find(a => a.id === editId);
      Object.assign(ag, { nome, trilha, naMeta, tpvMeta, churnMeta });
    } else {
      agentes.push({ id: Date.now().toString(), nome, trilha, naMeta, tpvMeta, churnMeta, realizado: {} });
    }

    persistir();
    fecharModal('modal-agente');
    render();
  }

  async function salvarLancamento() {
    const id = document.getElementById('lancar-agente').value;
    const ag = agentes.find(a => a.id === id);
    if (!ag) return;

    ag.realizado = {
      na:    Number(document.getElementById('lancar-na').value)    || 0,
      tpv:   Number(document.getElementById('lancar-tpv').value)   || 0,
      churn: Number(document.getElementById('lancar-churn').value) || 0,
      bonus: Number(document.getElementById('lancar-bonus').value) || 0,
    };

    persistir();
    fecharModal('modal-lancar');
    render();
  }

  async function persistir() {
    await sb.from('dados').upsert({ id: `mes_${mesAtual}_agentes`, valor: agentes });
  }


  // ── Fechar modal clicando fora ──────────────────────────
  document.querySelectorAll('.overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
  });

  // ── Admin / senha ───────────────────────────────────────
  const SENHA_HASH = 'Q25jMzIxdGltYnUh';
  let adminAtivo = false;

  function toggleAdmin() {
    if (adminAtivo) {
      adminAtivo = false;
      document.body.classList.remove('admin-mode');
      document.getElementById('btn-lock').textContent = '🔒';
    } else {
      const input = prompt('Senha:');
      if (!input) return;
      if (btoa(input) === SENHA_HASH) {
        adminAtivo = true;
        document.body.classList.add('admin-mode');
        document.getElementById('btn-lock').textContent = '🔓';
      } else {
        alert('Senha incorreta.');
      }
    }
  }

  async function novoMes() {
    if (!confirm('Criar novo mês? Agentes e metas são mantidos, realizados zerados.')) return;
    const [ano, mes] = mesAtual.split('_').map(Number);
    const d = new Date(ano, mes, 1);
    const proxChave = `${d.getFullYear()}_${String(d.getMonth()+1).padStart(2,'0')}`;
    const novosAgentes  = agentes.map(ag => ({ ...ag, realizado: {} }));
    const novaLogistica = logistica ? { ...logistica, realizado: {} } : null;
    await Promise.all([
      sb.from('dados').upsert({ id: `mes_${proxChave}_agentes`, valor: novosAgentes }),
      novaLogistica ? sb.from('dados').upsert({ id: `mes_${proxChave}_logistica`, valor: novaLogistica }) : Promise.resolve()
    ]);
    if (!mesesDisponiveis.includes(proxChave)) mesesDisponiveis.push(proxChave);
    await carregarMes(proxChave);
  }

  // ── Logística ────────────────────────────────────────────
  let logistica = null;

  const COMISSAO_LOG = 600;
  const PESOS_LOG = {
    tmaStone: 0.25, tmaTon: 0.25,
    ciclo: 0.1667, tmaBobinas: 0.1667,
    slaStone: 0.0833, slaTon: 0.0833
  };

  function calcScoreLog(log) {
    const m = log.metas    || {};
    const r = log.realizado || {};

    // Inverso: menor é melhor → ating = meta/real * 100
    const atTmaStone   = (r.tmaStone   > 0 && m.tmaStone   > 0) ? Math.min(m.tmaStone   / r.tmaStone   * 100, 100) : 0;
    const atTmaTon     = (r.tmaTon     > 0 && m.tmaTon     > 0) ? Math.min(m.tmaTon     / r.tmaTon     * 100, 100) : 0;
    const atCiclo      = (r.ciclo      > 0 && m.ciclo      > 0) ? Math.min(m.ciclo      / r.ciclo      * 100, 100) : 0;
    const atTmaBobinas = (r.tmaBobinas > 0 && m.tmaBobinas > 0) ? Math.min(m.tmaBobinas / r.tmaBobinas * 100, 100) : 0;
    // Normal: maior é melhor → ating = real/meta * 100
    const atSlaStone   = (m.slaStone   > 0) ? Math.min(r.slaStone   / m.slaStone   * 100, 100) : 0;
    const atSlaTon     = (m.slaTon     > 0) ? Math.min(r.slaTon     / m.slaTon     * 100, 100) : 0;

    const score = atTmaStone * 0.25 + atTmaTon * 0.25
                + atSlaStone * 0.0833 + atSlaTon * 0.0833
                + atCiclo * 0.1667 + atTmaBobinas * 0.1667;

    // Comissão proporcional: cada KPI batido (ating = 100%) libera seu peso * R$600
    const comissao =
      (atTmaStone   >= 100 ? COMISSAO_LOG * 0.25   : 0) +
      (atTmaTon     >= 100 ? COMISSAO_LOG * 0.25   : 0) +
      (atCiclo      >= 100 ? COMISSAO_LOG * 0.1667 : 0) +
      (atTmaBobinas >= 100 ? COMISSAO_LOG * 0.1667 : 0) +
      (atSlaStone   >= 100 ? COMISSAO_LOG * 0.0833 : 0) +
      (atSlaTon     >= 100 ? COMISSAO_LOG * 0.0833 : 0);

    return { atTmaStone, atTmaTon, atCiclo, atTmaBobinas, atSlaStone, atSlaTon, score, comissao };
  }

  function kpiRowLog(nome, ating, meta, real, inverso, pct) {
    const barW = Math.min(ating, 100);
    const cls  = ating >= 100 ? '' : ating >= 50 ? 'warn' : 'bad';
    const fmt  = v => pct
      ? Number(v).toLocaleString('pt-BR', {maximumFractionDigits:1}) + '%'
      : Number(v).toLocaleString('pt-BR', {maximumFractionDigits:2});
    return `
      <div class="kpi-item">
        <div class="kpi-top">
          <span class="kpi-nome">${nome}</span>
          <div class="kpi-nums">
            <span>Meta: <span class="destaque">${inverso ? '&lt;' : ''}${fmt(meta)}</span></span>
            <span>Real: <span class="destaque">${fmt(real)}</span></span>
            <span>Ating: <span class="destaque">${ating.toFixed(1)}%</span></span>
          </div>
        </div>
        <div class="kpi-bar-wrap">
          <div class="kpi-bar-real ${cls}" style="width:${barW}%"></div>
        </div>
      </div>`;
  }

  function renderLog() {
    const wrap = document.getElementById('log-card-wrap');
    if (!logistica) {
      wrap.innerHTML = `
        <div class="empty">
          <h3>Logística não configurada</h3>
          <p>Entre no modo admin e clique em "Configurar"</p>
        </div>
        <div style="text-align:center;margin-top:16px" class="admin-block">
          <button class="btn-lancar" onclick="abrirModalLogConfig()">Configurar</button>
        </div>`;
      return;
    }
    const { atTmaStone, atTmaTon, atCiclo, atTmaBobinas, atSlaStone, atSlaTon, score, comissao } = calcScoreLog(logistica);
    const st         = statusScore(score);
    const scoreClass = st === 'ok' ? '' : st === 'alerta' ? 'alerta' : 'risco';
    const m = logistica.metas;
    const r = logistica.realizado || {};
    const comissaoFmt = 'R$ ' + comissao.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});

    wrap.innerHTML = `
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:16px" class="admin-block">
        <button class="btn-lancar" onclick="abrirModalLogConfig()">Configurar</button>
        <button class="btn-lancar" onclick="abrirModalLogLancar()">Lançar</button>
      </div>
      <div class="agente-card status-${st}" style="max-width:600px;margin:0 auto">
        <div class="agente-header">
          <div>
            <div class="agente-nome">${logistica.nome}</div>
            <div class="agente-trilha">Logística · Comissão máx. R$ 600,00</div>
          </div>
          <div class="agente-score">
            <div class="score-num ${scoreClass}">${score.toFixed(1)}%</div>
          </div>
        </div>
        <div class="kpi-list">
          ${kpiRowLog('TMA Stone',     atTmaStone,   m.tmaStone,   r.tmaStone   || 0, true,  false)}
          ${kpiRowLog('TMA Ton',       atTmaTon,     m.tmaTon,     r.tmaTon     || 0, true,  false)}
          ${kpiRowLog('Ciclo Triagem', atCiclo,      m.ciclo,      r.ciclo      || 0, true,  false)}
          ${kpiRowLog('TMA Bobinas',   atTmaBobinas, m.tmaBobinas, r.tmaBobinas || 0, true,  false)}
          ${kpiRowLog('SLA Stone',     atSlaStone,   m.slaStone,   r.slaStone   || 0, false, true)}
          ${kpiRowLog('SLA Ton',       atSlaTon,     m.slaTon,     r.slaTon     || 0, false, true)}
        </div>
        <div class="agente-footer">
          <div class="valor-projetado">Comissão: <strong>${comissaoFmt}</strong></div>
        </div>
      </div>`;
  }

  function abrirModalLogConfig() {
    if (logistica) {
      document.getElementById('log-nome').value          = logistica.nome;
      document.getElementById('log-tma-stone').value     = logistica.metas.tmaStone;
      document.getElementById('log-tma-ton').value       = logistica.metas.tmaTon;
      document.getElementById('log-ciclo').value         = logistica.metas.ciclo;
      document.getElementById('log-tma-bobinas').value   = logistica.metas.tmaBobinas;
      document.getElementById('log-sla-stone').value     = logistica.metas.slaStone;
      document.getElementById('log-sla-ton').value       = logistica.metas.slaTon;
    }
    document.getElementById('modal-log-config').classList.add('open');
  }

  async function salvarLogConfig() {
    const nome       = document.getElementById('log-nome').value.trim();
    const tmaStone   = Number(document.getElementById('log-tma-stone').value);
    const tmaTon     = Number(document.getElementById('log-tma-ton').value);
    const ciclo      = Number(document.getElementById('log-ciclo').value);
    const tmaBobinas = Number(document.getElementById('log-tma-bobinas').value);
    const slaStone   = Number(document.getElementById('log-sla-stone').value);
    const slaTon     = Number(document.getElementById('log-sla-ton').value);
    if (!nome) { alert('Preencha o nome.'); return; }
    logistica = {
      nome,
      metas: { tmaStone, tmaTon, ciclo, tmaBobinas, slaStone, slaTon },
      realizado: logistica?.realizado || {}
    };
    await persistirLog();
    fecharModal('modal-log-config');
    renderLog();
  }

  function abrirModalLogLancar() {
    if (!logistica) return;
    const r = logistica.realizado || {};
    document.getElementById('log-r-tma-stone').value   = r.tmaStone   || '';
    document.getElementById('log-r-tma-ton').value     = r.tmaTon     || '';
    document.getElementById('log-r-ciclo').value       = r.ciclo      || '';
    document.getElementById('log-r-tma-bobinas').value = r.tmaBobinas || '';
    document.getElementById('log-r-sla-stone').value   = r.slaStone   || '';
    document.getElementById('log-r-sla-ton').value     = r.slaTon     || '';
    document.getElementById('modal-log-lancar').classList.add('open');
  }

  async function salvarLogLancamento() {
    logistica.realizado = {
      tmaStone:   Number(document.getElementById('log-r-tma-stone').value)   || 0,
      tmaTon:     Number(document.getElementById('log-r-tma-ton').value)     || 0,
      ciclo:      Number(document.getElementById('log-r-ciclo').value)       || 0,
      tmaBobinas: Number(document.getElementById('log-r-tma-bobinas').value) || 0,
      slaStone:   Number(document.getElementById('log-r-sla-stone').value)   || 0,
      slaTon:     Number(document.getElementById('log-r-sla-ton').value)     || 0,
    };
    await persistirLog();
    fecharModal('modal-log-lancar');
    renderLog();
  }

  async function persistirLog() {
    await sb.from('dados').upsert({ id: `mes_${mesAtual}_logistica`, valor: logistica });
  }

  // ── Data no header ──────────────────────────────────────
  async function atualizarData() {
    const { data } = await sb.from('dados').select('valor').eq('id', 'config').single();
    const salva = data?.valor?.dataAtualizado;
    const d = salva ? new Date(salva + 'T12:00:00') : new Date();
    const yyyy = d.getFullYear();
    const mm   = String(d.getMonth() + 1).padStart(2, '0');
    const dd   = String(d.getDate()).padStart(2, '0');
    document.getElementById('data-hoje').value           = `${yyyy}-${mm}-${dd}`;
    document.getElementById('data-display').textContent  = `${dd}/${mm}/${yyyy}`;
  }

  async function salvarData(val) {
    await sb.from('dados').upsert({ id: 'config', valor: { dataAtualizado: val || null } });
    atualizarData();
  }

  // ── Meses ────────────────────────────────────────────────
  const MESES_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  let mesAtual = '';
  let mesesDisponiveis = [];

  function atualizarLabelMes() {
    const [ano, mes] = mesAtual.split('_').map(Number);
    document.getElementById('mes-label').textContent = `${MESES_PT[mes-1]} ${ano}`;
    const idx = mesesDisponiveis.indexOf(mesAtual);
    document.getElementById('btn-mes-prev').style.opacity = idx > 0 ? '1' : '0.3';
    document.getElementById('btn-mes-next').style.opacity = idx < mesesDisponiveis.length - 1 ? '1' : '0.3';
  }

  async function carregarMes(chave) {
    mesAtual = chave;
    atualizarLabelMes();
    const [{ data: da }, { data: dl }] = await Promise.all([
      sb.from('dados').select('valor').eq('id', `mes_${chave}_agentes`).single(),
      sb.from('dados').select('valor').eq('id', `mes_${chave}_logistica`).single(),
    ]);
    agentes   = da?.valor || [];
    logistica = dl?.valor || null;
    render();
    renderLog();
  }

  async function migrarParaMeses() {
    const agora  = new Date();
    const chave  = `${agora.getFullYear()}_${String(agora.getMonth()+1).padStart(2,'0')}`;
    const [{ data: da }, { data: dl }] = await Promise.all([
      sb.from('dados').select('valor').eq('id', 'agentes').single(),
      sb.from('dados').select('valor').eq('id', 'logistica').single(),
    ]);
    await Promise.all([
      sb.from('dados').upsert({ id: `mes_${chave}_agentes`,   valor: da?.valor || [] }),
      dl?.valor ? sb.from('dados').upsert({ id: `mes_${chave}_logistica`, valor: dl.valor }) : Promise.resolve(),
    ]);
    mesesDisponiveis = [chave];
    mesAtual = chave;
  }

  async function carregarMeses() {
    const { data } = await sb.from('dados').select('id').like('id', 'mes_%');
    const meses = data
      ? [...new Set(data.map(r => { const m = r.id.match(/^mes_(\d{4}_\d{2})/); return m?.[1]; }).filter(Boolean))].sort()
      : [];
    if (meses.length > 0) {
      mesesDisponiveis = meses;
      mesAtual = meses[meses.length - 1];
    } else {
      await migrarParaMeses();
    }
    await carregarMes(mesAtual);
  }

  function mesAnterior() {
    const idx = mesesDisponiveis.indexOf(mesAtual);
    if (idx > 0) carregarMes(mesesDisponiveis[idx - 1]);
  }

  function mesSeguinte() {
    const idx = mesesDisponiveis.indexOf(mesAtual);
    if (idx < mesesDisponiveis.length - 1) carregarMes(mesesDisponiveis[idx + 1]);
  }

  // ── Abas ─────────────────────────────────────────────────
  function trocarAba(aba) {
    document.getElementById('tab-comercial').style.display = aba === 'comercial' ? '' : 'none';
    document.getElementById('tab-logistica').style.display = aba === 'logistica' ? '' : 'none';
    document.getElementById('tab-btn-comercial').classList.toggle('active', aba === 'comercial');
    document.getElementById('tab-btn-logistica').classList.toggle('active', aba === 'logistica');
  }

  // ── Init ────────────────────────────────────────────────
  atualizarData();
  carregarMeses();
</script>
